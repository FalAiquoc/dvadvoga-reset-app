<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Nova Senha - DV Advoga</title>
    <style>
        :root {
            --primary: #c9a55c; /* Gold/Lawyer theme */
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --error: #ff5252;
            --success: #4caf50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 4px solid var(--primary);
        }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 1.5rem; }

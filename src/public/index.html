<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Nova Senha - DV Advoga</title>
    <style>
        :root {
            --primary: #c9a55c; /* Gold/Lawyer theme */
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --error: #ff5252;
            --success: #4caf50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 4px solid var(--primary);
        }
        h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 12px;
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 1rem;
        }
        #message { margin-top: 1rem; font-size: 0.9rem; }
        .qr-section { 
            margin-bottom: 2rem; 
            padding: 1.5rem; 
            background: var(--card-bg); 
            border-radius: 8px; 
            border: 1px solid var(--primary); 
            display: none; 
        }
        .qr-section img { max-width: 200px; }
        .qr-text { font-size: 0.9em; color: var(--text); }
    </style>
</head>
<body>
    <div class="card">
        <h1>DV Advoga</h1>
        <p id="subtitle" style="margin-bottom: 1.5rem; opacity: 0.8;">Redefinição de Senha</p>

        <div id="qrContainer" class="qr-section">
            <p class="qr-text" style="margin-bottom: 15px;"><b>Configure o Google Authenticator:</b> Escaneie o código abaixo no app.</p>
            <img id="qrImage" src="" alt="QR Code 2FA" style="border: 5px solid white; border-radius: 5px; margin-bottom: 15px;">
            <p class="qr-text" style="opacity: 0.9; margin-bottom: 15px;">Após escanear, use o código de 6 dígitos abaixo.</p>
            
            <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
                <b style="color: var(--primary); font-size: 0.9em;">Chave de Configuração Manual:</b><br>
                <span id="secretKey" style="color: #fff; letter-spacing: 2px; font-family: monospace; font-size: 1.1em; background: #000; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-top: 8px;"></span>
            </div>
        </div>

        <form id="resetForm">
            <div class="input-group">
                <label>Nova Senha</label>
                <input type="password" id="password" required placeholder="Digite sua nova senha">
            </div>
            <div class="input-group">
                <label>Código de Segurança (App)</label>
                <input type="text" id="totp_token" required placeholder="000 000" maxlength="6">
            </div>
            <button type="submit" id="btnSubmit">Alterar Senha</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const token = pathParts.filter(p => p).pop();
        
        async function check2fa() {
            try {
                const res = await fetch(`../api/check-2fa/${token}`);
                const data = await res.json();
                if (data.qrImage) {
                    document.getElementById('qrContainer').style.display = 'block';
                    document.getElementById('qrImage').src = data.qrImage;
                    document.getElementById('subtitle').innerText = 'Configuração de Segurança';
                    if (data.secret) {
                        document.getElementById('secretKey').innerText = data.secret;
                    }
                }
            } catch (e) {
                console.error('Erro ao verificar 2FA');
            }
        }

        if (token) check2fa();

        document.getElementById('resetForm').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const totp_token = document.getElementById('totp_token').value;
            const msgDiv = document.getElementById('message');
            const btn = document.getElementById('btnSubmit');

            btn.disabled = true;
            btn.innerText = 'Processando...';

            try {
                const res = await fetch('../api/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password, totp_token })
                });
                const data = await res.json();
                if (data.success) {
                    msgDiv.style.color = 'var(--success)';
                    msgDiv.innerHTML = '✅ ' + data.message;
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('qrContainer').style.display = 'none';
                } else {
                    msgDiv.style.color = 'var(--error)';
                    msgDiv.innerHTML = '❌ ' + (data.error || 'Erro desconhecido.');
                }
            } catch (err) {
                msgDiv.style.color = 'var(--error)';
                msgDiv.innerHTML = '❌ Erro de conexão.';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Alterar Senha';
            }
        };
    </script>
</body>
</html>
